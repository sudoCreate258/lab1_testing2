name: Tests

on: [push, pull_request]

jobs:
tests:
runs-on: ubuntu-24.04

```
steps:
  - name: Checkout code (full history)
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Install dependencies
    run: |
      pip install -r requirements.txt

  - name: Create report directories
    run: |
      mkdir -p logs
      mkdir -p graphs
      mkdir -p reports

  - name: Run Code
    run: |
      export PYTHONPATH=src
      python3 src/main.py

  - name: Collect Git commit information
    run: |
      echo "Git Commit History Report" > reports/commit_info.txt
      echo "=========================" >> reports/commit_info.txt
      echo "" >> reports/commit_info.txt

      echo "Total commits in repository:" >> reports/commit_info.txt
      git rev-list --count HEAD >> reports/commit_info.txt
      echo "" >> reports/commit_info.txt

      echo "Detailed Commit History:" >> reports/commit_info.txt
      echo "" >> reports/commit_info.txt
      git log --pretty=format:"Commit: %H%nAuthor: %an%nDate: %ad%nMessage: %s%n---" >> reports/commit_info.txt
      echo "" >> reports/commit_info.txt

      echo "Commit Graph:" >> reports/commit_info.txt
      git log --oneline --graph --decorate >> reports/commit_info.txt

  - name: Show commit count
    run: |
      echo "Commit count in CI environment:"
      git rev-list --count HEAD

  - name: Show generated files
    run: |
      echo "---- LOG FILES ----"
      ls -l logs || echo "No logs folder"

      echo "---- GRAPH FILES ----"
      ls -l graphs || echo "No graphs folder"

      echo "---- REPORT FILES ----"
      ls -l reports || echo "No reports folder"

  - name: Show log output
    run: |
      if [ -f logs/lab1_test2.log ]; then
        echo "---- LOG OUTPUT ----"
        cat logs/lab1_test2.log
      else
        echo "No log file found"
      fi

  - name: Upload artifact (logs + graphs + commit info)
    uses: actions/upload-artifact@v4
    with:
      name: ci-report
      path: |
        logs/
        graphs/
        reports/commit_info.txt
```
