name: Tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create reports directory
        run: |
          mkdir -p reports

      - name: Run Code
        run: |
          export PYTHONPATH=src
          python3 src/main.py
      
      - name: Show generated files
        run: |
          echo "---- LOG FILES ----"
          ls -l logs || echo "No logs folder"
      
          echo "---- GRAPH FILES ----"
          ls -l graphs || echo "No graphs folder"
      - name: Show log output
        run: |
          if [ -f logs/run.log ]; then
            echo "---- LOG OUTPUT ----"
            cat logs/run.log
          else
            echo "No log file found"
          fi
